name: arch-diff
description: Structural diff for Go backends, posted as a PR comment (edited in place on each push).
branding:
  icon: git-branch
  color: purple
inputs:
  base:
    description: Base ref to diff against.
    default: ${{ github.event.pull_request.base.ref }}
  config:
    description: Path to arch-diff.yaml (optional).
    default: ""
  go-version:
    description: Go version to set up.
    default: "1.25"
  version:
    description: arch-diff version to install.
    default: latest
runs:
  using: composite
  steps:
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
    - shell: bash
      run: go install github.com/eularixs/arch-diff/cmd/arch-diff@${{ inputs.version }}
    - shell: bash
      run: git fetch --no-tags origin ${{ inputs.base }}
    - id: run
      shell: bash
      run: |
        cfg=""
        [ -n "${{ inputs.config }}" ] && cfg="--config ${{ inputs.config }}"
        arch-diff --repo . --base "origin/${{ inputs.base }}" --head HEAD $cfg > "$RUNNER_TEMP/arch-diff.md" || true
        echo "report=$RUNNER_TEMP/arch-diff.md" >> "$GITHUB_OUTPUT"
    - uses: actions/github-script@v7
      env:
        REPORT: ${{ steps.run.outputs.report }}
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- arch-diff -->';
          const body = marker + '\n' + fs.readFileSync(process.env.REPORT, 'utf8');
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          if (!issue_number) { core.info('not a PR; skipping comment'); return; }
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
